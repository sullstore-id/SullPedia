<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Maintenance - SullPedia</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <main class="maintenance-page">
    <section class="maintenance-card">
      <div class="maintenance-logo">SP</div>

      <span class="maintenance-badge">Maintenance Mode</span>

      <h1>SullPedia sedang diperbaiki</h1>

      <p id="maintenanceMessage">
        Mohon tunggu sebentar. Sistem sedang kami tingkatkan agar layanan lebih stabil dan nyaman digunakan.
      </p>

      <div class="maintenance-actions">
        <button id="refreshMaintenanceBtn" type="button">
          Coba Lagi
        </button>

        <button id="logoutMaintenanceBtn" type="button">
          Keluar Akun
        </button>
      </div>
    </section>
  </main>

  <script type="module" src="maintenance.js"></script>
</body>
</html>
